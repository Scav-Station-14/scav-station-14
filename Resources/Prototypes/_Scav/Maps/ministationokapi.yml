- type: gameMap
  id: MinistationOkapi
  mapName: 'Ministation Okapi'
  mapPath: /Maps/_Scav/ministationokapi.yml
  minPlayers: 0
  maxPlayers: 50
  stations:
    MinistationOkapi:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Ministation Okapi {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'IM'
        # - type: StationEmergencyShuttle
        #   emergencyShuttlePath: /Maps/Shuttles/emergency_meta.yml
        - type: ExtraStationInformation
          iconPath: /Textures/_NF/Logo/icon/icon-256x256.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'frontier-lobby-frontier-subtext'
          stationDescription: 'frontier-lobby-frontier-description'
          lobbySortOrder: 1
        - type: StationJobs
          availableJobs: # 30 jobs total w/o latejoins & interns, 49 jobs total w/ latejoins & interns
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            ChiefTacticalOfficer: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (5 - 9)
            Bartender: [ 1, 2 ]
            Botanist: [ 1, 2 ]
            Chef: [ 1, 2 ]
            Janitor: [ 1, 2 ]
            Librarian: [ 1, 1 ]
            #engineering (3 - 6)
            AtmosphericTechnician: [ 1, 2 ]
            StationEngineer: [ 2, 4 ]
            TechnicalAssistant: [ 2, 2 ] #intern, not counted
            #medical (3 - 4)
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 2, 3 ]
            MedicalIntern: [ 2, 2 ] #intern, not counted
            #science (2 - 4)
            Scientist: [ 2, 4 ]
            ResearchAssistant: [ 2, 2 ] #intern, not counted
            #tactical (2 - 3)
            Mercenary: [ 2, 3 ]
            #supply (4 - 6)
            SalvageSpecialist: [ 2, 3 ]
            CargoTechnician: [ 2, 3 ]
            #civilian (3+)
            Passenger: [ -1, -1 ] #infinite, not counted
            #silicon (4)
            StationAi: [ 1, 1 ]
            Borg: [ 3, 3 ]
