- type: stationMap
  id: MinistationOkapi
  parent: BaseStationMap
  name: "Ministation Okapi"
  minimumDistance: 1200
  maximumDistance: 4600
  gridPath: /Maps/_Scav/Stations/ministationokapi.yml
  addComponents:
  - type: StationTransit
    routes:
      SpawnPoints: 10

- type: gameMap
  id: MinistationOkapi
  mapName: 'Ministation Okapi'
  mapPath: /Maps/_Scav/Stations/ministationokapi.yml
  minPlayers: 0
  stations:
    MinistationOkapi:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Ministation Okapi {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'IM'
        # - type: StationEmergencyShuttle
        #   emergencyShuttlePath: /Maps/Shuttles/emergency_meta.yml
        - type: ExtraStationInformation
          iconPath: /Textures/_NF/Logo/icon/icon-256x256.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'frontier-lobby-frontier-subtext'
          stationDescription: 'frontier-lobby-frontier-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs: # 34 jobs total w/o latejoins & interns, 53 jobs total w/ latejoins & interns
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            ChiefTacticalOfficer: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (5 - 9)
            Bartender: [ 1, 2 ]
            Botanist: [ 1, 2 ]
            Chef: [ 1, 2 ]
            Janitor: [ 1, 2 ]
            Librarian: [ 1, 1 ]
            #engineering (3 - 6)
            AtmosphericTechnician: [ 1, 2 ]
            StationEngineer: [ 2, 4 ]
            TechnicalAssistant: [ 2, 2 ] #intern, not counted
            #medical (3 - 4)
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 2, 3 ]
            MedicalIntern: [ 2, 2 ] #intern, not counted
            #science (2 - 4)
            Scientist: [ 2, 4 ]
            ResearchAssistant: [ 2, 2 ] #intern, not counted
            #tactical (2 - 3)
            Mercenary: [ 2, 3 ]
            #supply (4 - 6)
            Pilot: [ 1, 2 ]
            CargoTechnician: [ 1, 2 ]
            #civilian (3+)
            CrewMember: [6, 6]
            #silicon (4)
            StationAi: [ 1, 1 ]
            Borg: [ 3, 3 ]
