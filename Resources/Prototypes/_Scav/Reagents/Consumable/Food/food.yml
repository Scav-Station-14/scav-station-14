#although the original intention was to restrict food to nutriment, vitamin, protein, and sugar, more granularity needs to be added to support things like dietary restriction in more complex detail

#Nutriment
- type: reagent
  id: Grain #Functionally identical to nutriment
  name: reagent-name-grain
  group: Foods
  desc: reagent-desc-grain
  physicalDesc: reagent-physical-desc-grainy
  flavor: bread
  color: "#D7BF84"
  metabolisms:
    Food:
      effects:
      - !type:SatiateHunger
      - !type:ChemVomit
        conditions:
        - !type:OrganType
          type: Yinglet
        probability: 0.6
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 1.5
  - !type:PlantAdjustHealth
    amount: 0.75
  pricePerUnit: 2

#may want to split into gluten and starch as well in the future

#Protein
#TODO: separate animal and plant proteins


- type: reagent
  id: SlimeMeat #used for foods that yinglets get a high off of
  name: reagent-name-slimemeat
  group: Foods
  desc: reagent-desc-slimemeat
  physicalDesc: reagent-physical-desc-slimy
  flavor: slimy
  color: "#D7BF84"
  metabolisms:
    Food:
      effects: #all the properties of Vitamin, but only for yinglets
      - !type:HealthChange
        conditions:
          - !type:OrganType
            type: Yinglet
        probability: 0.5
        damage:
          groups:
            Brute: -0.5
            Burn: -0.5
      - !type:ModifyBleedAmount
        conditions:
          - !type:OrganType
            type: Yinglet
        amount: -0.25
      - !type:SatiateHunger
        conditions:
          - !type:OrganType
            type: Yinglet
      - !type:GenericStatusEffect #also makes them get a high
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 8
        refresh: false
        conditions:
        - !type:OrganType
          type: Yinglet
